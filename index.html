<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hydro Pro v4.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2f2f7" id="theme-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="AppIcon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <link rel="stylesheet" href="styles.css?v=41">
</head>
<body class="light-mode">
    <div id="toast-container"></div>
    <header id="G-HEADER"><h1 id="dynamic-header-title">Dashboard</h1></header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active" data-title="Dashboard">
            <div style="padding: 0 25px 15px;">
                <p style="margin:0; opacity:0.5; font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:1px;" id="home-date">LOADING DATE...</p>
                <h2 id="home-greeting" style="margin:0; font-size:32px; font-weight:950; letter-spacing:-1px;">Good Morning.</h2>
            </div>
            <div id="home-weather-pill" class="ADM-card" style="margin: 0 20px 20px; padding: 15px 20px; display:flex; align-items:center; gap: 15px; cursor: pointer;" onclick="openTab('weather-root', 'nav-wth-btn')">
                <span style="font-size: 30px;" id="hw-icon">🌤️</span>
                <div style="flex:1;"><strong style="font-size: 18px; display:block;" id="hw-temp">--°C</strong><small style="opacity:0.6; font-weight:800;" id="hw-desc">Syncing radar...</small></div>
                <div style="opacity:0.3; font-size:20px;">›</div>
            </div>
            <div class="FIN-hero-iron" style="border-color: var(--success); padding: 25px; margin-bottom: 20px;">
                <small style="opacity:0.5; font-weight:900; text-transform:uppercase; letter-spacing:1px;">Today's Route Pipeline</small>
                <div id="home-jobs-value" style="font-size: 45px; font-weight: 950; color: var(--success); line-height: 1.1; margin-top: 5px;">£0.00</div>
                <div id="home-jobs-count" style="font-weight: 800; opacity: 0.7; margin-bottom: 20px; font-size: 15px;">0 Jobs Scheduled</div>
                <button class="ADM-save-btn" style="margin-top: 0; height: 60px!important; background: var(--success);" onclick="openTab('week-view-root', 'nav-route-btn')">🚀 START ROUTE</button>
            </div>
            <div class="FIN-bubble-row" style="margin-bottom: 20px;">
                <div class="FIN-bubble" style="flex-direction:column; align-items:flex-start;"><small>TOTAL ARREARS</small><strong style="color:var(--danger); font-size:22px;" id="home-arrears">£0.00</strong></div>
                <div class="FIN-bubble" style="flex-direction:column; align-items:flex-start;"><small>CASH IN HAND</small><strong style="color:var(--success); font-size:22px;" id="home-cash">£0.00</strong></div>
            </div>
            <div style="padding: 0 20px 30px;">
                <div style="display:flex; gap:15px; width: 100%;"><button class="ADM-util-btn blue" style="flex: 1;" onclick="openAddCustomerModal()">➕ Add Cust</button><button class="ADM-util-btn grey" style="flex: 1;" onclick="openExpenseModal()">🛒 Log Exp</button></div>
            </div>
            <button class="ai-floating-btn ai-glow-btn" onclick="triggerAI('voice')">🎤 Tap to Speak to Hydro AI</button>
        </section>
        
        <section id="week-view-root" class="tab-content" data-title="Route">
            <div class="theme-segmented-control" style="margin: 5px auto 15px; width: calc(100% - 40px);">
                <button id="wk-btn-1" class="segment active" onclick="setWorkingWeek(1)">W1</button>
                <button id="wk-btn-2" class="segment" onclick="setWorkingWeek(2)">W2</button>
                <button id="wk-btn-3" class="segment" onclick="setWorkingWeek(3)">W3</button>
                <button id="wk-btn-4" class="segment" onclick="setWorkingWeek(4)">W4</button>
                <button id="wk-btn-5" class="segment" onclick="setWorkingWeek(5)">W5</button>
            </div>
            <div class="WEE-day-selector" style="margin: 0 auto 20px; width: calc(100% - 40px);">
                <button class="WEE-day-btn" id="day-Mon" onclick="setWorkingDay('Mon', this)">M</button>
                <button class="WEE-day-btn" id="day-Tue" onclick="setWorkingDay('Tue', this)">T</button>
                <button class="WEE-day-btn" id="day-Wed" onclick="setWorkingDay('Wed', this)">W</button>
                <button class="WEE-day-btn" id="day-Thu" onclick="setWorkingDay('Thu', this)">T</button>
                <button class="WEE-day-btn" id="day-Fri" onclick="setWorkingDay('Fri', this)">F</button>
                <button class="WEE-day-btn" id="day-Sat" onclick="setWorkingDay('Sat', this)">S</button>
                <button class="WEE-day-btn" id="day-Sun" onclick="setWorkingDay('Sun', this)">S</button>
            </div>
            <div style="display:flex; gap:10px; margin: 0 20px 10px; width: calc(100% - 40px);"><button class="ADM-save-btn" style="flex: 2; background: var(--text); color: var(--bg);" onclick="routeMyDay()">📍 ROUTE</button><button class="ADM-save-btn" style="flex: 1; background: transparent; border: 2px solid var(--accent); color: var(--accent); box-shadow: none;" onclick="openTomorrowModal()">🔮 TMRW</button></div>
            <div id="WEE-progress-dashboard"></div>
            <div id="WEE-list-container"></div>
        </section>

        <section id="master-root" class="tab-content" data-title="Customers">
            <div style="padding: 0 25px 15px; width: 100%; max-width: 400px; margin: 0 auto;">
                <button class="ADM-save-btn" style="margin-top: 0; margin-bottom: 5px; box-shadow: 0 10px 25px rgba(0,122,255,0.2);" onclick="openAddCustomerModal()">➕ ADD NEW CUSTOMER</button>
            </div>
            <div class="CST-search-vault">
                <input type="text" id="mainSearch" placeholder="🔍 Search Name, Street, or Phone..." oninput="renderMaster()">
                <div style="display: flex; justify-content: center; margin-top: 15px; width: 100%;">
                    <button id="arrearsFilterBtn" class="CST-filter-btn" onclick="toggleArrearsFilter()">⚠️ SHOW ARREARS ONLY</button>
                </div>
            </div>
            <div id="CST-list-container"></div>
        </section>

        <section id="weather-root" class="tab-content" data-title="Weather">
            <div id="ptr-indicator" class="ptr-hidden">⬇️ Pull to Refresh</div>
            <div id="WTH-dashboard">
                <div class="empty-state"><span class="empty-icon">📡</span><div class="empty-text">Syncing Radar...</div></div>
            </div>
        </section>

        <section id="finances-root" class="tab-content" data-title="Finances">
            <div id="FIN-black-card" class="fin-black-card"></div>
            <div id="FIN-bento-box" class="fin-bento-grid"></div>

            <div class="ADM-card" style="padding: 25px 15px; margin-top: 10px;">
                <h3 class="ADM-hdr" style="margin-bottom: 20px;">Revenue Pipeline</h3>
                <div style="height: 250px; position: relative;">
                    <canvas id="financeChartCanvas"></canvas>
                </div>
            </div>
            
            <h3 class="ADM-hdr" style="text-align: left; padding-left: 25px; margin-bottom: 10px;">Log Expense</h3>
            <button class="ADM-save-btn ai-glow-btn" style="margin: 0 20px 10px; width: calc(100% - 40px); font-size: 14px; height: 60px!important;" onclick="triggerAI('receipt')">📸 Auto-Scan Receipt with AI ✨</button>
            <button class="ADM-save-btn" style="margin: 0 20px 20px; width: calc(100% - 40px); background: var(--card); color: var(--text); border: 2px dashed var(--ios-grey); box-shadow: none;" onclick="openExpenseModal()">➕ LOG MANUAL EXPENSE</button>
            
            <h3 class="ADM-hdr" style="text-align: left; padding-left: 2
