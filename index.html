<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimate Hydro Pro v3.3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2f2f7" id="theme-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="AppIcon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <link rel="stylesheet" href="styles.css?v=33">
</head>
<body class="light-mode">
    <div id="toast-container"></div>
    <header id="G-HEADER"><h1 id="dynamic-header-title">Dashboard</h1></header>

    <main id="G-VIEWPORT">
        <section id="home-root" class="tab-content active" data-title="Dashboard">
            <div style="padding: 0 25px 15px;">
                <p style="margin:0; opacity:0.5; font-weight:800; font-size:13px; text-transform:uppercase;" id="home-date">LOADING...</p>
                <h2 id="home-greeting" style="margin:0; font-size:32px; font-weight:950; letter-spacing:-1px;">Good Morning.</h2>
            </div>
            <div id="home-weather-pill" class="ADM-card" style="margin: 0 20px 20px; padding: 15px 20px; display:flex; align-items:center; gap: 15px;" onclick="openTab('weather-root', 'nav-wth-btn')">
                <span style="font-size: 30px;" id="hw-icon">🌤️</span>
                <div style="flex:1;"><strong style="font-size: 18px; display:block;" id="hw-temp">--°C</strong><small style="opacity:0.6; font-weight:800;" id="hw-desc">Syncing...</small></div>
            </div>
            <div class="FIN-hero-iron" style="border-color: var(--success); padding: 25px; margin-bottom: 20px;">
                <small style="opacity:0.5; font-weight:900; text-transform:uppercase;">Today's Pipeline</small>
                <div id="home-jobs-value" style="font-size: 45px; font-weight: 950; color: var(--success);">£0.00</div>
                <div id="home-jobs-count" style="font-weight: 800; opacity: 0.7; margin-bottom: 20px;">0 Jobs Scheduled</div>
                <button class="ADM-save-btn" style="background: var(--success);" onclick="openTab('week-view-root', 'nav-route-btn')">🚀 START ROUTE</button>
            </div>
            <div class="FIN-bubble-row">
                <div class="FIN-bubble"><small>ARREARS</small><strong style="color:var(--danger);" id="home-arrears">£0.00</strong></div>
                <div class="FIN-bubble"><small>CASH</small><strong style="color:var(--success);" id="home-cash">£0.00</strong></div>
            </div>
            <div style="padding: 20px;">
                <div style="display:flex; gap:15px;"><button class="ADM-util-btn blue" style="flex:1;" onclick="openAddCustomerModal()">➕ Add Cust</button><button class="ADM-util-btn grey" style="flex:1;" onclick="openExpenseModal()">🛒 Log Exp</button></div>
            </div>
            <button class="ai-floating-btn ai-glow-btn" onclick="triggerAI('voice')">🎤 Speak to Hydro AI</button>
        </section>

        <section id="week-view-root" class="tab-content" data-title="Route">
            <div class="theme-segmented-control" style="width: calc(100% - 40px); margin: 0 auto 15px;">
                <button id="wk-btn-1" class="segment active" onclick="setWorkingWeek(1)">W1</button>
                <button id="wk-btn-2" class="segment" onclick="setWorkingWeek(2)">W2</button>
                <button id="wk-btn-3" class="segment" onclick="setWorkingWeek(3)">W3</button>
                <button id="wk-btn-4" class="segment" onclick="setWorkingWeek(4)">W4</button>
                <button id="wk-btn-5" class="segment" onclick="setWorkingWeek(5)">W5</button>
            </div>
            <div class="WEE-day-selector" style="width: calc(100% - 40px); margin: 0 auto 20px;">
                <button class="WEE-day-btn" id="day-Mon" onclick="setWorkingDay('Mon', this)">M</button>
                <button class="WEE-day-btn" id="day-Tue" onclick="setWorkingDay('Tue', this)">T</button>
                <button class="WEE-day-btn" id="day-Wed" onclick="setWorkingDay('Wed', this)">W</button>
                <button class="WEE-day-btn" id="day-Thu" onclick="setWorkingDay('Thu', this)">T</button>
                <button class="WEE-day-btn" id="day-Fri" onclick="setWorkingDay('Fri', this)">F</button>
                <button class="WEE-day-btn" id="day-Sat" onclick="setWorkingDay('Sat', this)">S</button>
                <button class="WEE-day-btn" id="day-Sun" onclick="setWorkingDay('Sun', this)">S</button>
            </div>
            <div style="display:flex; gap:10px; margin: 0 20px 20px;"><button class="ADM-save-btn" style="flex:2; background:var(--text); color:var(--bg);" onclick="routeMyDay()">📍 ROUTE</button><button class="ADM-save-btn" style="flex:1; background:transparent; border:2px solid var(--accent); color:var(--accent); box-shadow:none;" onclick="openTomorrowModal()">🔮 TMRW</button></div>
            <div id="WEE-progress-dashboard"></div>
            <div id="WEE-list-container"></div>
        </section>

        <section id="master-root" class="tab-content" data-title="Customers">
            <div class="CST-search-vault">
                <input type="text" id="mainSearch" placeholder="🔍 Search Name or Street..." oninput="renderMaster()">
                <button id="arrearsFilterBtn" class="CST-filter-btn" style="margin-top:10px;" onclick="toggleArrearsFilter()">⚠️ ARREARS ONLY</button>
            </div>
            <div id="CST-list-container"></div>
        </section>

        <section id="weather-root" class="tab-content" data-title="Weather">
            <div id="ptr-indicator" class="ptr-hidden">⬇️ Pull to Refresh</div>
            <div id="WTH-dashboard"></div>
        </section>

        <section id="finances-root" class="tab-content" data-title="Finances">
            <div id="FIN-black-card" class="fin-black-card"></div>
            <div id="FIN-bento-box" class="fin-bento-grid"></div>
            <div class="ADM-card">
                <canvas id="financeChartCanvas"></canvas>
            </div>
            <button class="ADM-save-btn ai-glow-btn" style="margin: 0 20px 10px; width:calc(100% - 40px);" onclick="triggerAI('receipt')">📸 Scan Receipt ✨</button>
            <button class="ADM-save-btn" style="margin: 0 20px 20px; width:calc(100% - 40px); background:var(--card); color:var(--text); border:2px dashed var(--ios-grey); box-shadow:none;" onclick="openExpenseModal()">➕ Manual Expense</button>
            <div id="FIN-ledger-list"></div>
        </section>

        <section id="admin-root" class="tab-content" data-title="Settings">
            <div class="ADM-card" style="border: 2px solid #8a2be2;">
                <h3 class="ADM-hdr" style="color:#8a2be2;">🧠 AI Vault</h3>
                <div class="ADM-row"><span>🔑</span><input type="password" id="sAIKey" placeholder="API Key"></div>
                <button class="ADM-save-btn ai-glow-btn" style="height:50px!important; font-size:14px;" onclick="saveSettingsAIKey()">SECURE KEY</button>
            </div>
            <div class="ADM-card">
                <h3 class="ADM-hdr">UK Tax Engine 🇬🇧</h3>
                <select id="taxYearSelect" class="ADM-row" style="width:100%; border:none; background:var(--ios-grey); border-radius:10px; margin-bottom:10px;"><option value="2025">2025 / 2026</option></select>
                <button class="ADM-save-btn" style="background:var(--accent);" onclick="cmdGenerateTaxPDF()">📄 ANNUAL PDF</button>
            </div>
            <div class="ADM-util-vault">
                <button class="ADM-util-btn green" onclick="cmdCycleMonth()">🚀 START NEW MONTH</button>
                <button class="ADM-util-btn red" onclick="cmdNuclear()">☢️ RESET APP</button>
                <footer id="G-FOOTER">ULTIMATE HYDRO PRO // v3.3</footer>
            </div>
        </section>
    </main>

    <nav id="BOTTOM-NAV">
        <button id="nav-route-btn" class="nav-item" onclick="openTab('week-view-root', 'nav-route-btn')"><span>📍</span><small>Route</small></button>
        <button id="nav-cust-btn" class="nav-item" onclick="openTab('master-root', 'nav-cust-btn')"><span>👥</span><small>Custs</small></button>
        <div class="nav-fab-wrapper"><button id="nav-home-btn" class="home-fab active" onclick="openTab('home-root', 'nav-home-btn')">🏠</button></div>
        <button id="nav-fin-btn" class="nav-item" onclick="openTab('finances-root', 'nav-fin-btn')"><span>💰</span><small>Finance</small></button>
        <button id="nav-set-btn" class="nav-item" onclick="openTab('admin-root', 'nav-set-btn')"><span>⚙️</span><small>Admin</small></button>
    </nav>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden onchange="handlePhotoUpload(event)">

    <div id="aiTeaserModal" class="modal-overlay hidden" onclick="closeAITeaserModal()">
        <div class="modal-content bottom-sheet" onclick="event.stopPropagation()">
            <div class="modal-drag-pill"></div>
            <h2 style="text-align:center;">✨ Wake up AI</h2>
            <input type="password" id="aiKeyInputModal" placeholder="sk-..." style="width:100%; height:50px; border-radius:15px; border:1px solid #ddd; padding:15px; margin-bottom:20px;">
            <button class="ADM-save-btn ai-glow-btn" onclick="saveModalAIKey()">ACTIVATE</button>
        </div>
    </div>

    <div id="addCustomerModal" class="modal-overlay hidden" onclick="closeAddCustomerModal()">
        <div class="modal-content bottom-sheet" onclick="event.stopPropagation()">
            <div class="modal-drag-pill"></div>
            <div class="CMD-header"><h2 id="customerModalTitle">Customer</h2></div>
            <div class="ADM-row"><span>👤</span><input type="text" id="cName" placeholder="Name"></div>
            <div class="ADM-row"><span>🏠</span><input type="text" id="cHouseNum" placeholder="No."></div>
            <div class="ADM-row"><span>🛣️</span><input type="text" id="cStreet" placeholder="Street"></div>
            <div class="ADM-row"><span>💰</span><input type="number" id="cPrice" placeholder="£"></div>
            <div class="ADM-row"><span>📅</span><select id="cWeek"><option value="1">W1</option><option value="2">W2</option><option value="3">W3</option><option value="4">W4</option><option value="5">W5</option></select></div>
            <div class="ADM-row"><span>📆</span><select id="cDay"><option value="Mon">Mon</option><option value="Tue">Tue</option><option value="Wed">Wed</option><option value="Thu">Thu</option><option value="Fri">Fri</option></select></div>
            <button class="ADM-save-btn" onclick="saveCustomer()">SAVE</button>
        </div>
    </div>

    <div id="briefingModal" class="modal-overlay hidden" onclick="closeBriefing()"><div class="modal-content bottom-sheet" onclick="event.stopPropagation()"><div class="modal-drag-pill"></div><div id="briefingData"></div></div></div>
    
    <div id="paymentModal" class="modal-overlay hidden" onclick="closePaymentModal()">
        <div class="modal-content bottom-sheet" onclick="event.stopPropagation()">
            <div class="modal-drag-pill"></div>
            <h2 id="pay-name">Checkout</h2>
            <div id="pay-arrears-box" class="CMD-alert-danger"></div>
            <button id="pay-full-btn" class="ADM-save-btn" style="background:var(--success);" onclick="processPayment('full')">PAY FULL</button>
            <input type="number" id="pay-custom-amt" placeholder="Other £" style="width:100%; height:60px; text-align:center; font-size:24px; border:none; margin:10px 0;">
            <button class="ADM-save-btn" style="background:var(--text); color:var(--bg);" onclick="processPayment('custom')">PARTIAL</button>
        </div>
    </div>

    <div id="expenseModal" class="modal-overlay hidden" onclick="closeExpenseModal()">
        <div class="modal-content bottom-sheet" onclick="event.stopPropagation()">
            <div class="modal-drag-pill"></div>
            <h2>Expense</h2>
            <div class="ADM-row"><span>🏷️</span><select id="mExpCat"><option value="Fuel">Fuel</option><option value="Equip">Equip</option></select></div>
            <div class="ADM-row"><span>🛒</span><input type="text" id="mExpDesc" placeholder="Item"></div>
            <div class="ADM-row"><span>💸</span><input type="number" id="mExpAmt" placeholder="£"></div>
            <button class="ADM-save-btn" onclick="addFinanceExpense()">SAVE</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay hidden" onclick="closeConfirmModal()">
        <div class="modal-content" onclick="event.stopPropagation()" style="text-align:center;">
            <h2 id="confirmTitle">Confirm?</h2><p id="confirmText"></p>
            <div style="display:flex; gap:10px;"><button class="ADM-save-btn" style="background:#eee; color:#000;" onclick="closeConfirmModal()">NO</button><button id="confirmActionBtn" class="ADM-save-btn" style="background:var(--danger);">YES</button></div>
        </div>
    </div>

    <div id="print-area"></div>
    <script src="app.js?v=33" defer></script>
</body>
</html>
